services:
  stratosfear:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=development
    container_name: stratosfear-game
    ports:
      - "9347:9347"
    environment:
      - NODE_ENV=production
      - PORT=9347
      - HOST=0.0.0.0
      - VITE_GAME_SPEED=${VITE_GAME_SPEED:-1.0}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - VITE_API_URL=${VITE_API_URL:-http://localhost:9347}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9347"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - traefik.enable=true
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.stratosfear.rule=Host(`${SERVICE_FQDN_STRATOSFEAR:-stratosfear.localhost}`)"
      - traefik.http.routers.stratosfear.entrypoints=https
      - traefik.http.routers.stratosfear.tls=true
      - traefik.http.routers.stratosfear.tls.certresolver=letsencrypt
      - "traefik.http.services.stratosfear.loadbalancer.server.port=9347"
    networks:
      - coolify

networks:
  coolify:
    external: true
