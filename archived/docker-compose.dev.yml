version: '3.8'

services:
  stratosfear:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stratosfear-dev
    ports:
      - "9346:9346"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:9346
    volumes:
      - ./concept_base:/app/concept_base
      - ./dist:/app/dist
    command: npm run dev
    restart: unless-stopped
