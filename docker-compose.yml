services:
  stratosfear:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stratosfear-game
    ports:
      - "6959:6959"
      - "6969:6969"
    environment:
      - NODE_ENV=production
      - PORT=6959
      - VITE_API_URL=http://localhost:6959
      - VITE_GAME_SPEED=1.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6959"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: stratosfear-network
