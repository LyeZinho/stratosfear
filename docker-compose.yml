services:
  stratosfear:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stratosfear-game
    ports:
      - "6959:6959"
    environment:
      - NODE_ENV=production
      - PORT=6959
      - VITE_API_URL=http://localhost:6959
      - VITE_GAME_SPEED=1.0
    networks:
      - coolify
    restart: unless-stopped
    labels:
      - "traefik.docker.network=coolify"
      - "traefik.http.services.stratosfear.loadbalancer.server.port=6959"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6959"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  coolify:
    external: true
